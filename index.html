<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histo Lab Pro</title>

<style>

/* BACKGROUND VIDEO */
video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(10,15,25,0.85);
    z-index: -1;
}

/* GLOBAL */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

/* LAYOUT */
.container {
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(15px);
    padding-top: 20px;
    position: fixed;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 30px;
    color: #00eaff;
}

.sidebar button {
    width: 100%;
    padding: 15px;
    border: none;
    background: transparent;
    color: white;
    text-align: left;
    cursor: pointer;
    transition: 0.3s;
}

.sidebar button:hover {
    background: rgba(0,255,255,0.2);
}

.active {
    background: #00c6ff !important;
}

/* MAIN */
.main {
    margin-left: 220px;
    padding: 20px;
    width: 100%;
}

/* TOPBAR */
.topbar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.title {
    font-size: 24px;
    color: #00eaff;
}

/* CARDS */
.card {
    background: rgba(255,255,255,0.08);
    padding: 20px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    margin-bottom: 20px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px rgba(0,255,255,0.3);
}

/* FORM */
input, select {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* BUTTON */
.btn {
    background: linear-gradient(45deg,#00c6ff,#0072ff);
    border: none;
    padding: 10px 15px;
    color: white;
    cursor: pointer;
    border-radius: 8px;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* STATS */
.stats {
    display: flex;
    gap: 10px;
}

.stat {
    flex: 1;
    text-align: center;
    padding: 15px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    text-align: center;
}

th {
    background: rgba(255,255,255,0.2);
}

/* TABS */
.tab {
    display: none;
    animation: fade 0.5s ease;
}

.show {
    display: block;
}

@keyframes fade {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
<source src="bg.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>Histo Lab</h2>

<button onclick="openTab('patient')" class="active">Patient Record</button>
<button onclick="openTab('report')">Report Entry</button>
<button onclick="openTab('dashboard')">Dashboard</button>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<div class="title">Dashboard Overview</div>
</div>

<!-- PATIENT -->
<div id="patient" class="tab show">
<div class="card">
<h3>Patient Entry</h3>

<input type="date" id="date">
<input type="text" id="name" placeholder="Name">
<input type="number" id="age" placeholder="Age">

<br>
<button class="btn" onclick="save()">Save</button>

</div>
</div>

<!-- REPORT -->
<div id="report" class="tab">
<div class="card">
<h3>Report Entry</h3>
<input type="text" placeholder="Diagnosis">
<br>
<button class="btn">Save Report</button>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tab">

<div class="stats">
<div class="stat">Total: <span id="total">0</span></div>
<div class="stat">Process: <span id="process">0</span></div>
<div class="stat">Review: <span id="review">0</span></div>
<div class="stat">Verified: <span id="verified">0</span></div>
</div>

<div class="card">
<table>
<tr><th>Date</th><th>Name</th><th>Status</th></tr>
<tbody id="table"></tbody>
</table>
</div>

</div>

</div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("data")) || [];

function openTab(id){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("show"));
document.getElementById(id).classList.add("show");
}

function save(){
let record = {
date: document.getElementById("date").value,
name: document.getElementById("name").value,
status: "IN PROCESS"
};

data.push(record);
localStorage.setItem("data", JSON.stringify(data));

display();
}

function display(){

let table = document.getElementById("table");
table.innerHTML = "";

let process=0,review=0,verified=0;

data.forEach(r=>{
table.innerHTML += `<tr><td>${r.date}</td><td>${r.name}</td><td>${r.status}</td></tr>`;

if(r.status=="IN PROCESS") process++;
if(r.status=="REVIEW") review++;
if(r.status=="VERIFIED") verified++;
});

document.getElementById("total").innerText = data.length;
document.getElementById("process").innerText = process;
document.getElementById("review").innerText = review;
document.getElementById("verified").innerText = verified;
}

display();

</script>

</body>
</html>
