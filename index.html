<!DOCTYPE html>
<html>
<head>
<title>Histopathology System</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
}

/* TABS */
.tabs {
    display: flex;
    background: #111;
}

.tabs button {
    flex: 1;
    padding: 15px;
    border: none;
    background: #222;
    color: white;
    cursor: pointer;
}

.tabs button:hover {
    background: #00c6ff;
}

.active {
    background: #00c6ff !important;
}

/* CONTENT */
.tab-content {
    display: none;
    padding: 20px;
}

.show {
    display: block;
}

/* FORM */
input, select {
    padding: 10px;
    margin: 5px;
    border-radius: 5px;
    border: none;
}

/* BUTTON */
button.save {
    background: #00c6ff;
    padding: 10px;
    border: none;
    color: white;
    cursor: pointer;
}

/* STATS */
.stats {
    display: flex;
    gap: 10px;
}

.stat {
    flex: 1;
    background: rgba(255,255,255,0.1);
    padding: 15px;
    text-align: center;
}

/* TABLE */
table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    text-align: center;
}

th {
    background: rgba(255,255,255,0.2);
}

</style>
</head>

<body>

<h2 style="text-align:center;">Histopathology System</h2>

<!-- TABS -->
<div class="tabs">
    <button onclick="openTab('patient')" class="active">Patient Record</button>
    <button onclick="openTab('report')">Report Entry</button>
    <button onclick="openTab('dashboard')">Case Dashboard</button>
</div>

<!-- PATIENT TAB -->
<div id="patient" class="tab-content show">

<h3>Patient Record (Google Sheet)</h3>

<input type="date" id="p_date">
<input type="text" id="p_name" placeholder="Patient Name">
<input type="number" id="p_age" placeholder="Age">
<input type="text" id="p_mr" placeholder="MR No">

<br>
<button class="save" onclick="savePatient()">Save Patient</button>

</div>

<!-- REPORT TAB -->
<div id="report" class="tab-content">

<h3>Report Entry (Google Docs)</h3>

<input type="text" placeholder="Report Title">
<input type="text" placeholder="Patient Name">
<input type="text" placeholder="Diagnosis">

<br>
<button class="save">Save Report</button>

<p>👉 (Next upgrade me Google Docs auto generate karenge)</p>

</div>

<!-- DASHBOARD TAB -->
<div id="dashboard" class="tab-content">

<h3>Case Dashboard</h3>

<!-- FILTER -->
<input type="text" id="search" placeholder="Search">
<select id="statusFilter">
    <option value="">All</option>
    <option>IN PROCESS</option>
    <option>REVIEW</option>
    <option>VERIFIED</option>
</select>

<button onclick="display()">Apply Filter</button>

<!-- STATS -->
<div class="stats">
    <div class="stat">Total: <span id="total">0</span></div>
    <div class="stat">Process: <span id="process">0</span></div>
    <div class="stat">Review: <span id="review">0</span></div>
    <div class="stat">Verified: <span id="verified">0</span></div>
</div>

<!-- TABLE -->
<table>
<tr>
<th>Date</th>
<th>Name</th>
<th>Status</th>
</tr>
<tbody id="table"></tbody>
</table>

</div>

<script>

let cases = JSON.parse(localStorage.getItem("cases")) || [];

/* TAB SWITCH */
function openTab(tab) {
    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("show"));
    document.getElementById(tab).classList.add("show");

    document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
    event.target.classList.add("active");
}

/* SAVE PATIENT */
function savePatient() {

    let data = {
        date: document.getElementById("p_date").value,
        name: document.getElementById("p_name").value,
        age: document.getElementById("p_age").value,
        mr: document.getElementById("p_mr").value,
        status: "IN PROCESS"
    };

    cases.push(data);
    localStorage.setItem("cases", JSON.stringify(cases));

    // GOOGLE SHEET SEND
    fetch("YOUR_GOOGLE_SCRIPT_URL", {
        method: "POST",
        body: JSON.stringify(data)
    });

    alert("Saved!");
    display();
}

/* DISPLAY DASHBOARD */
function display() {

    let table = document.getElementById("table");
    table.innerHTML = "";

    let search = document.getElementById("search").value.toLowerCase();
    let statusFilter = document.getElementById("statusFilter").value;

    let total=0, process=0, review=0, verified=0;

    cases.forEach(c => {

        if(search && !c.name.toLowerCase().includes(search)) return;
        if(statusFilter && c.status != statusFilter) return;

        table.innerHTML += `
        <tr>
            <td>${c.date}</td>
            <td>${c.name}</td>
            <td>${c.status}</td>
        </tr>`;

        total++;

        if(c.status=="IN PROCESS") process++;
        if(c.status=="REVIEW") review++;
        if(c.status=="VERIFIED") verified++;
    });

    document.getElementById("total").innerText = total;
    document.getElementById("process").innerText = process;
    document.getElementById("review").innerText = review;
    document.getElementById("verified").innerText = verified;
}

display();

</script>

</body>
</html>
