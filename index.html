<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Histo Lab</title>

<style>

/* VIDEO BACKGROUND */
video {
    position: fixed;
    right: 5;
    bottom: 5;
    min-width: 50%;
    min-height: 50%;
    z-index: -1;
    object-fit: cover;
}

/* DARK OVERLAY */
.overlay {
    position: fixed;
    width: 50%;
    height: 500%;
    background: rgba(0,0,0,0.1);
    z-index: -1;
}

/* BODY */
body {
    font-family: Arial;
    margin: 0;
    color: white;
}

/* HEADER */
h2 {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    letter-spacing: 1px;
    animation: fadeIn 2s ease;
}

/* TABS */
.tabs {
    display: flex;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
}

.tabs button {
    flex: 1;
    padding: 15px;
    border: none;
    background: transparent;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.tabs button:hover {
    background: #00c6ff;
}

.active {
    background: #00c6ff !important;
}

/* CONTENT */
.tab-content {
    display: none;
    padding: 20px;
    animation: fadeIn 1s ease;
}

.show {
    display: block;
}

/* GLASS CARD */
.card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    margin-bottom: 20px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.02);
}

/* INPUT */
input, select {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* BUTTON */
button.save {
    background: #00c6ff;
    padding: 10px;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 8px;
    transition: 0.3s;
}

button.save:hover {
    background: #0072ff;
}

/* STATS */
.stats {
    display: flex;
    gap: 10px;
}

.stat {
    flex: 1;
    background: rgba(255,255,255,0.1);
    padding: 15px;
    text-align: center;
    border-radius: 10px;
}

/* TABLE */
table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    text-align: center;
}

th {
    background: rgba(255,255,255,0.2);
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}

</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
    <source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<h2>Histo Lab Management System</h2>

<!-- TABS -->
<div class="tabs">
    <button onclick="openTab('patient')" class="active">Patient Record</button>
    <button onclick="openTab('report')">Report Entry</button>
    <button onclick="openTab('dashboard')">Histo Lab</button>
</div>

<!-- PATIENT -->
<div id="patient" class="tab-content show">
<div class="card">
<h3>Patient Record</h3>

<input type="date" id="p_date">
<input type="text" id="p_name" placeholder="Patient Name">
<input type="number" id="p_age" placeholder="Age">
<input type="text" id="p_mr" placeholder="MR No">

<br>
<button class="save" onclick="savePatient()">Save Patient</button>
</div>
</div>

<!-- REPORT -->
<div id="report" class="tab-content">
<div class="card">
<h3>Report Entry</h3>
<input type="text" placeholder="Report Title">
<input type="text" placeholder="Diagnosis">
<br>
<button class="save">Save Report</button>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tab-content">

<div class="card">
<h3>Histo Lab Dashboard</h3>

<input type="text" id="search" placeholder="Search">
<select id="statusFilter">
<option value="">All</option>
<option>IN PROCESS</option>
<option>REVIEW</option>
<option>VERIFIED</option>
</select>

<button onclick="display()">Apply</button>

<div class="stats">
<div class="stat">Total: <span id="total">0</span></div>
<div class="stat">Process: <span id="process">0</span></div>
<div class="stat">Review: <span id="review">0</span></div>
<div class="stat">Verified: <span id="verified">0</span></div>
</div>

<table>
<tr><th>Date</th><th>Name</th><th>Status</th></tr>
<tbody id="table"></tbody>
</table>

</div>
</div>

<script>

let cases = JSON.parse(localStorage.getItem("cases")) || [];

function openTab(tab) {
    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("show"));
    document.getElementById(tab).classList.add("show");

    document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
    event.target.classList.add("active");
}

function savePatient() {
    let data = {
        date: document.getElementById("p_date").value,
        name: document.getElementById("p_name").value,
        age: document.getElementById("p_age").value,
        status: "IN PROCESS"
    };

    cases.push(data);
    localStorage.setItem("cases", JSON.stringify(cases));

    alert("Saved!");
    display();
}

function display() {

    let table = document.getElementById("table");
    table.innerHTML = "";

    let total=0, process=0, review=0, verified=0;

    cases.forEach(c => {

        table.innerHTML += `
        <tr>
        <td>${c.date}</td>
        <td>${c.name}</td>
        <td>${c.status}</td>
        </tr>`;

        total++;
        if(c.status=="IN PROCESS") process++;
        if(c.status=="REVIEW") review++;
        if(c.status=="VERIFIED") verified++;
    });

    document.getElementById("total").innerText = total;
    document.getElementById("process").innerText = process;
    document.getElementById("review").innerText = review;
    document.getElementById("verified").innerText = verified;
}

display();

</script>

</body>
</html>
