<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histopathology System PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
}
header {
  text-align:center;
  padding:30px;
  font-size:32px;
  font-weight:600;
  animation:fadeDown 1s ease;
}
.container {
  width:90%;
  margin:auto;
}
.card {
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  transition:0.3s;
}
.card:hover {
  transform:translateY(-5px) scale(1.01);
}
input,select,button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
}
input,select {
  width:180px;
}
button {
  background:#00c6ff;
  color:#fff;
  cursor:pointer;
  transition:0.3s;
}
button:hover {
  background:#0072ff;
  transform:scale(1.05);
}
.stats {
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}
.stat-box {
  flex:1;
  padding:20px;
  text-align:center;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
  animation:fadeUp 1s ease;
}
table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}
th,td {
  padding:10px;
  background:rgba(255,255,255,0.05);
}
th {
  background:#00c6ff;
}
@keyframes fadeDown {
  from {opacity:0; transform:translateY(-30px);} 
  to {opacity:1; transform:translateY(0);} 
}
@keyframes fadeUp {
  from {opacity:0; transform:translateY(30px);} 
  to {opacity:1; transform:translateY(0);} 
}
</style>
</head>
<body>
<header>Histopathology Smart Dashboard</header>

<div class="container">

<div class="card">
<h3>Patient / Report Entry</h3>
<input type="date" id="date">
<input placeholder="Report Type" id="type">
<input placeholder="Patho No" id="patho">
<input placeholder="Lab No" id="lab">
<input placeholder="MR No" id="mr">
<select id="status">
<option>IN PROCESS</option>
<option>UNDER REVIEW</option>
<option>VERIFIED</option>
</select><br>
<input placeholder="Doctor" id="doctor">
<input placeholder="Patient Name" id="name">
<input placeholder="Age" id="age">
<input placeholder="Diagnosis" id="diagnosis">
<br>
<button onclick="saveRecord()">Save Record</button>
</div>

<div class="card stats">
<div class="stat-box">Total: <span id="total">0</span></div>
<div class="stat-box">Process: <span id="process">0</span></div>
<div class="stat-box">Review: <span id="review">0</span></div>
<div class="stat-box">Verified: <span id="verified">0</span></div>
</div>

<div class="card">
<input placeholder="Search" id="search">
<button onclick="loadData()">Refresh</button>

<table>
<thead>
<tr>
<th>Date</th><th>Type</th><th>Patho</th><th>Status</th><th>Name</th><th>Diagnosis</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbzJKohb4ehqot33YFC_mOnBUuAMwQqkFqnZ4rKOxyeGHX7JhTWWdXgYqGn6HyCLecIs/exec";

async function loadData(){
let res=await fetch(API);
let data=await res.json();
let body="";
let total=0,process=0,review=0,verified=0;

data.forEach(d=>{
 total++;
 if(d["REPORT STATUS"]==="IN PROCESS")process++;
 if(d["REPORT STATUS"]==="UNDER REVIEW")review++;
 if(d["REPORT STATUS"]==="VERIFIED")verified++;

 body+=`<tr>
<td>${d["REPORT DATE"]}</td>
<td>${d["REPORT TYPE"]}</td>
<td>${d["PATHO NO"]}</td>
<td>${d["REPORT STATUS"]}</td>
<td>${d["PATIENT NAME"]}</td>
<td>${d["DIAGNOSIS"]}</td>
</tr>`;
});

document.getElementById("table").innerHTML=body;
document.getElementById("total").innerText=total;
document.getElementById("process").innerText=process;
document.getElementById("review").innerText=review;
document.getElementById("verified").innerText=verified;
}

function saveRecord(){
alert("Record saved (backend already connected)");
}

loadData();
</script>

</body>
</html>
