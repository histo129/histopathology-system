<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HistoPro System</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff;display:flex}
.sidebar{width:220px;background:#020617;height:100vh;padding:20px}
.sidebar h2{color:#38bdf8}
.sidebar a{display:block;color:#cbd5f5;margin:10px 0;text-decoration:none}
.main{flex:1;padding:20px}
.card{background:#1e293b;padding:15px;border-radius:10px;margin-bottom:15px}
input,select,button{padding:8px;margin:5px;border-radius:5px;border:none}
button{background:#38bdf8;color:#000;cursor:pointer}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #333}
th{background:#38bdf8;color:#000}
</style>
</head>

<body>

<div class="sidebar">
<h2>HistoPro</h2>
<a>Dashboard</a>
<a>Reports</a>
<a>Analytics</a>
</div>

<div class="main">

<div class="card">
<h3>Entry Form</h3>

<input id="date" type="date">
<input id="type" placeholder="Type">
<input id="patho" placeholder="Patho No">
<input id="lab" placeholder="Lab No">
<input id="mr" placeholder="MR No">

<select id="status">
<option>IN PROCESS</option>
<option>UNDER REVIEW</option>
<option>VERIFIED</option>
</select>

<br>

<input id="doctor" placeholder="Doctor">
<input id="name" placeholder="Patient Name">
<input id="age" placeholder="Age">
<input id="diagnosis" placeholder="Diagnosis">

<br>

<button onclick="saveRecord()">Save</button>
</div>

<div class="card">
<h3>Records</h3>
<button onclick="loadData()">Refresh</button>

<table>
<thead>
<tr>
<th>Date</th><th>Type</th><th>Patho</th><th>Status</th><th>Name</th><th>Diagnosis</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzJKohb4ehqot33YFC_mOnBUuAMwQqkFqnZ4rKOxyeGHX7JhTWWdXgYqGn6HyCLecIs/exec";

// SAVE
async function saveRecord(){
  const data = {
    reportDate: date.value || new Date().toISOString().split('T')[0],
    reportType: type.value,
    pathoNo: patho.value,
    labNo: lab.value,
    mrNo: mr.value,
    status: status.value,
    verifiedBy: doctor.value,
    remarks: "",
    patientName: name.value,
    patientAge: age.value,
    history: "",
    diagnosis: diagnosis.value
  };

  await fetch(API,{
    method:"POST",
    body:JSON.stringify(data)
  });

  alert("Saved!");
  loadData();
}

// LOAD
async function loadData(){
  let res = await fetch(API);
  let data = await res.json();

  let html="";
  data.forEach(d=>{
    html+=`<tr>
<td>${d["REPORT DATE"]}</td>
<td>${d["REPORT TYPE"]}</td>
<td>${d["PATHO NO"]}</td>
<td>${d["REPORT STATUS"]}</td>
<td>${d["PATIENT NAME"]}</td>
<td>${d["DIAGNOSIS"]}</td>
</tr>`;
  });

  document.getElementById("table").innerHTML = html;
}

loadData();
</script>

</body>
</html>
